<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Finance Control</title>

    <!-- Favicon - paths are relative, Vite will transform based on 'base' config -->
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./logo.svg" />
    <link rel="shortcut icon" href="./favicon.png" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#7c3aed" />
    <meta
      name="description"
      content="Finance Control - Gerenciamento inteligente de finanças pessoais"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Finance Control" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
    <script>
      // Aplica o tema antes do React renderizar para evitar flash branco (FOUC).
      // Lê "themePreference" do localStorage — mesma chave usada pelo App.tsx.
      (function() {
        try {
          var pref = localStorage.getItem('themePreference');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = pref === 'dark' || (pref !== 'light' && prefersDark);
          if (isDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.removeAttribute('data-theme');
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    <script>
      // Restaura o path codificado pelo 404.html para o React Router (GitHub Pages SPA fallback).
      // Ref: https://github.com/rafgraph/spa-github-pages
      (function() {
        var redirect = window.location.search.match(/[?&]p=([^&]*)/);
        if (redirect) {
          var path = decodeURIComponent(redirect[1].replace(/~and~/g, '&'));
          var query = window.location.search
            .replace(/[?&]p=[^&]*/, '')
            .replace(/^&/, '?');
          window.history.replaceState(
            null, null,
            window.location.pathname.replace(/\/$/, '') + path + query + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
