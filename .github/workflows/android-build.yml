name: Build Android APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Web Assets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build:mobile

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        id: get_version
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          # Extrai a versão real do build.gradle rodando uma pequena task
          ./gradlew -q help # Apenas para garantir que o gradle esteja pronto
          VERSION_NAME=$(./gradlew -q printVersionName | tail -n 1)
          if [ -z "$VERSION_NAME" ]; then VERSION_NAME="1.0.unknown"; fi
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          cp app/build/outputs/apk/debug/app-debug.apk ../nix-$VERSION_NAME-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nix-v${{ steps.get_version.outputs.VERSION_NAME }}-apk
          path: nix-*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'pull_request'
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION_NAME }}
          name: Nix v${{ steps.get_version.outputs.VERSION_NAME }}
          files: nix-*.apk
          body: |
            Nova versão de teste gerada automaticamente.
            Versão: ${{ steps.get_version.outputs.VERSION_NAME }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
