name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: BUILD_TARGET=mobile npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Resolve version
        id: ver
        run: |
          COUNT=$(git rev-list --count HEAD)
          NAME="1.0.${COUNT}"
          TAG="v${NAME}"
          echo "name=${NAME}"              >> $GITHUB_OUTPUT
          echo "tag=${TAG}"               >> $GITHUB_OUTPUT
          echo "apk=nix-${TAG}-debug.apk" >> $GITHUB_OUTPUT

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/${{ steps.ver.outputs.apk }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          APK="android/app/build/outputs/apk/debug/${{ steps.ver.outputs.apk }}"
          SHORT_SHA=$(git rev-parse --short HEAD)

          # Remove release/tag existente para permitir re-runs do workflow
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG"   2>/dev/null || true

          gh release create "$TAG" \
            --title "Nix $TAG" \
            --notes "$(printf 'Debug build\n\n**Commit:** %s\n**Branch:** %s\n**Build:** #%s' \
              "$SHORT_SHA" "${{ github.ref_name }}" "${{ github.run_number }}")" \
            "$APK"
